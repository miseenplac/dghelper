  <style>
    body {
      margin: 0;
      padding: 30px;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      text-align: center;
    }
    h1 {
      color: #f5c842;
      margin: 0 0 10px;
      font-size: 22px;
    }
    p { color: #bbb; margin: 8px 0 24px; line-height: 1.5; }
    .btn {
      display: inline-block;
      background: #2a9d4f;
      color: white;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 5px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
      border: 1px solid #1f7a3c;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }
    .btn:hover { background: #32b85a; }

<body>
  <h1>dghelper</h1>
  <p>Logs your Dungeoneering floor times automatically. No setup needed.</p>

  <a class="btn" id="install-btn" href="#">Add to Alt1</a>

  <script>
    // `alt1://addapp/<configUrl>` is the canonical install path across
    // Alt1 versions — Alt1's CEF intercepts the protocol URL and shows
    // the install dialog.
    const configUrl = window.location.origin + '/appconfig.json';
    document.getElementById('install-btn').href = 'alt1://addapp/' + configUrl;
  </script>
</body>
