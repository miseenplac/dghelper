<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Install dghelper</title>
  <style>
    body {
      margin: 0;
      padding: 30px;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      text-align: center;
    }
    h1 {
      color: #f5c842;
      margin: 0 0 10px;
      font-size: 22px;
    }
    p { color: #bbb; margin: 8px 0 24px; line-height: 1.5; }
    .btn {
      display: inline-block;
      background: #2a9d4f;
      color: white;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 5px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
      border: 1px solid #1f7a3c;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }
    .btn:hover { background: #32b85a; }
    code {
      background: #2a2a2a;
      color: #f5c842;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: Consolas, monospace;
    }
    .note {
      margin-top: 36px;
      padding-top: 14px;
      border-top: 1px solid #333;
      color: #888;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>dghelper</h1>
  <p>RS3 Dungeoneering floor-times tracker.<br>Click the button below to install this app into Alt1.</p>

  <a class="btn" id="install-btn" href="#">Add to Alt1</a>

  <div id="msg" class="note"></div>

  <div class="note">
    If this page isn&rsquo;t opened <em>inside Alt1&rsquo;s built-in browser</em> the button won&rsquo;t work.<br><br>
    Manifest URL: <code id="cfg-url"></code>
  </div>

  <script>
    const configUrl = window.location.origin + '/appconfig.json';
    document.getElementById('cfg-url').textContent = configUrl;

    // The `alt1://addapp/<configUrl>` protocol URL is the canonical
    // "Add this app" path across Alt1 versions. Alt1's CEF intercepts
    // it and shows the install dialog.
    const installUrl = 'alt1://addapp/' + configUrl;
    const installBtn = document.getElementById('install-btn');
    installBtn.href = installUrl;

    const msg = document.getElementById('msg');
    function say(text, color) {
      msg.textContent = text;
      msg.style.color = color || '#bbb';
    }

    installBtn.addEventListener('click', () => {
      say('Opening Alt1 install dialog… if nothing appears, make sure this page is inside Alt1’s built-in browser.', '#6ee09a');
      setTimeout(() => {
        if (window.alt1 && typeof alt1.identifyAppUrl === 'function') {
          try { alt1.identifyAppUrl(configUrl); } catch (_) {}
        }
      }, 500);
    });

    if (window.alt1) {
      say('Alt1 detected — click the button to install.', '#6ee09a');
    } else {
      say('Not running inside Alt1’s built-in browser. Open Alt1 → browse to this page inside Alt1.', '#f5c842');
    }
  </script>
</body>
</html>
